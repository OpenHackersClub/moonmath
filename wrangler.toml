#
# MoonMath — Cloudflare Worker deployment
#
# Implements the deployment target defined in specs/prd.md (milestone v0.2.5).
# A thin TypeScript Worker serves the prerendered SSG output via Workers Static
# Assets and exposes an optional Lean4 compile fallback at /api/lean/compile.
#
# First-time setup:
#   1) `npm install` inside ./worker
#   2) `wrangler kv namespace create LEAN_RATE_LIMIT` and paste the id below
#      (and `... --preview` for the preview id).
#   3) `wrangler secret put LEAN_FALLBACK_URL` if you want the compile route
#      to forward to a managed Lean service. Without it the route returns 503.
#   4) `cargo run -p moonmath-ssg && cargo leptos build --release && \
#       scripts/prerender.sh` to populate ./dist.
#   5) `wrangler deploy` to push to the `moonmath` Worker on workers.dev.
#

name = "moonmath"
main = "worker/src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Workers Static Assets binding — the prerendered SSG output.
# `scripts/prerender.sh` populates ./dist; CI does the same before `wrangler deploy`.
[assets]
directory = "./dist"
binding = "ASSETS"
# Pretty URLs already have their own index.html in subdirectories
# (e.g. dist/showcase/number-theory/prime-theorem/index.html), so use the
# default html_handling that resolves them. 404s fall through to dist/404.html.
not_found_handling = "404-page"
html_handling = "auto-trailing-slash"

[vars]
LEAN_FALLBACK_ENABLED = "true"
LEAN_REQUEST_MAX_BYTES = "32768"

# Per-IP rate limiter for /api/lean/compile. Replace `id`/`preview_id` with the
# values printed by `wrangler kv namespace create LEAN_RATE_LIMIT`.
# Until then the Worker treats a missing binding as "no rate limiting" and
# logs a warning on first request.
# [[kv_namespaces]]
# binding = "LEAN_RATE_LIMIT"
# id = "TODO-replace-with-output-of-wrangler-kv-namespace-create"
# preview_id = "TODO-replace-with-output-of-wrangler-kv-namespace-create-preview"

# Successful-compile cache for /api/CompileLean, keyed by sha256(code). Demos
# replay the same proof many times — caching dodges the container roundtrip
# and keeps p95 latency ~30ms after the first hit. Provision with:
#   wrangler kv namespace create LEAN_CACHE
#   wrangler kv namespace create LEAN_CACHE --preview
# [[kv_namespaces]]
# binding = "LEAN_CACHE"
# id = "TODO-replace-with-output-of-wrangler-kv-namespace-create"
# preview_id = "TODO-replace-with-output-of-wrangler-kv-namespace-create-preview"

# ─── Lean compile container — TEMPORARILY DISABLED ──────────────────────────
#
# The Worker dispatches POST /api/CompileLean to this container, which runs
# `lean` via the tiny HTTP wrapper in services/lean/server.ts. See
# docs/lean-service.md for the full architecture and cost model.
#
# DISABLED until the CLOUDFLARE_API_TOKEN GitHub secret is regenerated with
# Containers permissions and the Cloudflare account has Containers enabled
# (Workers paid plan). With the previous wrangler 3.90.0, `[[containers]]`
# was silently dropped so the missing scope never surfaced; wrangler 4.x
# now actually pushes the image and 401s with a bare "Unauthorized".
#
# When the token is updated:
#   1. Uncomment the three blocks below.
#   2. Run `./scripts/preflight.sh` locally with Docker up to verify the
#      build + dry-run still pass.
#   3. Push and watch CI; the first deploy will provision the DO class +
#      upload the image, subsequent deploys are diff-only.
#
# Until then `POST /api/CompileLean` returns the existing
# `ServerError|Lean compile container is not bound on this deployment.`,
# which is no worse than the pre-PR-#4 baseline.

# [[durable_objects.bindings]]
# name = "LEAN_COMPILER"
# class_name = "LeanCompiler"
#
# [[migrations]]
# tag = "v1"
# new_sqlite_classes = ["LeanCompiler"]
#
# [[containers]]
# class_name = "LeanCompiler"
# image = "./services/lean/Dockerfile"
# # `standard-1` ≈ 4 GB memory, 0.5 vCPU — plenty for a single Lean process.
# # Drop to `basic` once the v0 image is profiled; raise to a larger tier when
# # Mathlib lands (v0.2.6) and compile memory headroom matters. Wrangler 4.x
# # renamed the legacy "standard" tier to "standard-1".
# instance_type = "standard-1"
# # Cap concurrent instances so a traffic spike can't blow the bill. With
# # sleepAfter=10m most demos serve from a single warm instance.
# max_instances = 5

# Local dev: `wrangler dev` serves the same Worker against ./dist on :8787.
[dev]
port = 8787
local_protocol = "http"

# Tail logs go to Cloudflare Logpush by default; explicit observability config
# requires the workers_observability flag and is left to the dashboard.
[observability]
enabled = true

# ─── Deploy targets ──────────────────────────────────────────────────────────
#
# Default `wrangler deploy` pushes to the top-level `name = "moonmath"` Worker
# on workers.dev. Per-PR previews come from CI passing
#   `wrangler deploy --name moonmath-preview-pr-<n>`
# from .github/workflows/deploy.yml — `--name` clones the full top-level config
# (including the LEAN_COMPILER container binding) into a fresh Worker.
#
# Named environments (`[env.staging]`, `[env.production]`) were removed because
# wrangler does NOT inherit top-level bindings into named envs — duplicating
# every binding under each env is the price of split envs, and we don't yet
# need that split. Re-introduce per-env blocks once a real staging zone exists,
# remembering to repeat the `[[durable_objects.bindings]]`, `[[migrations]]`,
# and `[[containers]]` blocks under each env.

# routes = [
#   { pattern = "moonmath.dev/*", zone_name = "moonmath.dev" },
# ]
