name: Deploy (Cloudflare Worker)

# Implements specs/prd.md → "Deployment (Cloudflare Workers)".
#
# Triggers:
#   - push to default branch  → deploys the top-level `moonmath` Worker
#   - manual workflow_dispatch → same (top-level config; no env split)
#   - pull_request           → preview deploy at moonmath-preview-pr-<n>
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  — token with Workers Scripts:Edit + Account:Read
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#
# Acceptance gate: after deploy, scripts/acceptance.sh hits the live URL and
# fails the run if any route is broken. This is the HTTP-level smoke gate;
# the full chromiumoxide CDP suite (PRD v0.2.6) lands separately.

on:
  push:
    branches:
      - feat/inspirations-hall-of-fame
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  # Required by google-github-actions/auth@v2 when using Workload Identity
  # Federation for the Search Console post-deploy step. Harmless when the
  # WIF vars are unset (the auth step is gated behind them).
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: deploy

      - name: Install cargo-leptos
        run: cargo install --locked cargo-leptos@0.3.4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate SSG data
        run: cargo run -p moonmath-ssg

      - name: Build release (cargo leptos)
        run: cargo leptos build --release

      - name: Prerender routes to dist/
        run: ./scripts/prerender.sh

      - name: Verify dist/ shape
        run: |
          set -e
          test -f dist/index.html
          test -f dist/showcase/index.html
          test -d dist/pkg
          test -d dist/data
          echo "pages: $(find dist -name index.html | wc -l)"

      # IndexNow key file. Must live at the site root so api.indexnow.org can
      # fetch <host>/<key>.txt and confirm the caller controls the host. The
      # contents are the key itself. The shell-level `[ -n ... ]` guard is
      # what gates execution — a step-level `if: env.INDEXNOW_KEY != ''` does
      # NOT work because step `env` is not visible to the step's own `if`.
      - name: Write IndexNow key file
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "${INDEXNOW_KEY:-}" ]; then
            echo "INDEXNOW_KEY secret not set — skipping IndexNow key file"
            exit 0
          fi
          printf '%s' "$INDEXNOW_KEY" > "dist/${INDEXNOW_KEY}.txt"
          echo "wrote dist/<INDEXNOW_KEY>.txt ($(wc -c < "dist/${INDEXNOW_KEY}.txt") bytes)"

      - name: Install Worker dependencies
        working-directory: worker
        run: npm install --no-audit --no-fund

      - name: Typecheck Worker
        working-directory: worker
        run: npm run typecheck

      # ─── Deploy ────────────────────────────────────────────────────────────

      - name: Resolve deploy target
        id: target
        env:
          HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
          HAS_CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "kind=preview" >> "$GITHUB_OUTPUT"
            echo "name=moonmath-preview-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "kind=production" >> "$GITHUB_OUTPUT"
          fi
          if [ "$HAS_CF_TOKEN" = "true" ] && [ "$HAS_CF_ACCOUNT" = "true" ]; then
            echo "creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "creds=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare secrets not configured — deploy step will be skipped. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID to the repo to enable deploys."
          fi

      # `wranglerVersion` is required for two reasons:
      #   1. wrangler-action's default (3.90.0) predates Cloudflare Containers,
      #      so it silently drops `[[containers]]` and the LEAN_COMPILER DO
      #      ends up bound with no container behind it.
      #   2. wrangler 3.114.0 (worker/package.json's previous pin) is itself
      #      broken — it ships a deprecation warning ("Deployments with
      #      nodejs_compat are broken") and rejects `[[containers]]` with
      #      "containers should be an object, but got an array".
      # Wrangler 4.x is where Containers are GA and the documented array
      # syntax works again.
      - name: Deploy preview Worker
        id: deploy_preview
        if: steps.target.outputs.kind == 'preview' && steps.target.outputs.creds == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.86.0"
          command: deploy --name ${{ steps.target.outputs.name }}

      - name: Deploy production Worker
        id: deploy_env
        if: steps.target.outputs.kind == 'production' && steps.target.outputs.creds == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.86.0"
          command: deploy

      # ─── Acceptance ──────────────────────────────────────────────────────
      # HTTP-level smoke gate against the just-deployed URL. Walks every
      # route enumerated from target/ssg-data, asserts 200 + brand + hydration
      # script + KaTeX rendering survive.

      - name: Resolve deployed URL
        id: deployed_url
        if: steps.target.outputs.creds == 'true'
        run: |
          if [ "${{ steps.target.outputs.kind }}" = "preview" ]; then
            url="${{ steps.deploy_preview.outputs.deployment-url }}"
          else
            url="${{ steps.deploy_env.outputs.deployment-url }}"
          fi
          if [ -z "$url" ]; then
            echo "::error::wrangler-action did not return a deployment-url"
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Acceptance target: $url"

      - name: Run acceptance suite against deployment
        if: steps.target.outputs.creds == 'true'
        env:
          BASE_URL: ${{ steps.deployed_url.outputs.url }}
        run: ./scripts/acceptance.sh "$BASE_URL"

      # ─── Search Console + IndexNow post-deploy ──────────────────────────
      # Production only. Gated behind `vars.GCP_WIF_PROVIDER` so the rest of
      # CI keeps working until the WIF setup lands (see scripts/seo/README.md).
      # Runs AFTER acceptance — we don't want to advertise a broken deploy.

      - name: Auth to GCP for Search Console
        id: gcp_auth
        if: steps.target.outputs.kind == 'production' && steps.target.outputs.creds == 'true' && vars.GCP_WIF_PROVIDER != '' && vars.GCP_SEARCH_CONSOLE_SA != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SEARCH_CONSOLE_SA }}

      - name: Set up Node for SEO scripts
        if: steps.gcp_auth.outcome == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/seo/package-lock.json

      - name: Install SEO script deps
        if: steps.gcp_auth.outcome == 'success'
        working-directory: scripts/seo
        run: npm ci --no-audit --no-fund

      - name: Search Console + IndexNow post-deploy
        if: steps.gcp_auth.outcome == 'success'
        working-directory: scripts/seo
        env:
          SITE_URL: ${{ steps.deployed_url.outputs.url }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: npm run post-deploy

      - name: Comment preview URL on PR
        if: steps.target.outputs.kind == 'preview' && steps.target.outputs.creds == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const name = "${{ steps.target.outputs.name }}";
            const url = "${{ steps.deployed_url.outputs.url }}";
            const body = `Preview deployed: ${url}\n\n_(Worker name: \`${name}\` — acceptance suite passed against this URL.)_`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === "Bot" && c.body.startsWith("Preview deployed:"));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
