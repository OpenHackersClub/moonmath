<?xml version="1.0" encoding="UTF-8"?>
<!--
  MoonMath — default Open Graph card.

  1200x630 is the canonical OG image size used by Facebook, LinkedIn, and
  Twitter (with `summary_large_image`). The dark palette mirrors the rest
  of the site (see crates/moonmath-app/style/main.css → :root vars).

  Per-page cards are out of scope for this PR; specs/seo.md tracks the
  follow-up that wires the build-time card pipeline (specs/prd.md → Card
  Images) into the OG image slot.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="100%" stop-color="#11161f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1a1f2e" stroke-width="1" opacity="0.5">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Accent rule -->
  <rect x="80" y="80" width="120" height="6" fill="url(#accent)" rx="3"/>

  <!-- Wordmark -->
  <text x="80" y="200"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="96"
        font-weight="700"
        fill="#e8eaed"
        letter-spacing="-2">MoonMath</text>

  <!-- Tagline -->
  <text x="80" y="260"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32"
        fill="#a0a8b8">Interactive Math Visualization</text>

  <!-- Iconic formula: Euler's identity, rendered as plain SVG glyphs so we
       don't depend on a font that ships KaTeX-style math typesetting. -->
  <g transform="translate(80,440)">
    <text font-family="'New Computer Modern', 'Cambria Math', 'STIX Two Math', Georgia, serif"
          font-style="italic"
          font-size="120"
          fill="url(#accent)">
      <tspan>e</tspan>
      <tspan dy="-40" font-size="72">i&#960;</tspan>
      <tspan dy="40" font-style="normal"> + 1 = 0</tspan>
    </text>
  </g>

  <!-- Footer -->
  <text x="80" y="580"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="22"
        fill="#5a6378"
        letter-spacing="1">moonmath.app</text>
</svg>
